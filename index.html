<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Pełny ekran obrazka</title>
    <style>
        #imgFullscreen {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
    </style>
</head>
<body>

<button onclick="openFullscreen()">Pokaż obraz w pełnym ekranie</button>

<img id="imgFullscreen" src="zdjecie.png" alt="Obraz">

<script>
function openFullscreen() {
    const img = document.getElementById("imgFullscreen");
    img.style.display = "block";

    if (img.requestFullscreen) {
        img.requestFullscreen();
    } else if (img.webkitRequestFullscreen) {
        img.webkitRequestFullscreen();
    } else if (img.msRequestFullscreen) {
        img.msRequestFullscreen();
    }
}
</script>

</body>
</html>
